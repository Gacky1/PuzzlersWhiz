<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Viewport & Theme -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#060610" />
    <meta name="color-scheme" content="dark" />

    <!-- Primary Meta -->
    <title>PuzzlersWhiz – Learn. Practice. Master.</title>
    <meta name="description" content="PuzzlersWhiz is a modern EdTech platform helping students master cloud technologies, SQL, and real-world skills through HD courses, interactive labs, and timed quizzes." />
    <meta name="keywords" content="EdTech, online learning, upskill, cloud technologies, SQL labs, quiz platform, India education, PuzzlersWhiz, coding courses, student platform" />
    <meta name="author" content="PuzzlersWhiz" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://puzzlerswhiz.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PuzzlersWhiz" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:title" content="PuzzlersWhiz – Learn. Practice. Master." />
    <meta property="og:description" content="PuzzlersWhiz is a modern EdTech platform helping students master cloud technologies, SQL, and real-world skills through HD courses, interactive labs, and timed quizzes." />
    <meta property="og:url" content="https://puzzlerswhiz.com/" />
    <meta property="og:image" content="https://puzzlerswhiz.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="PuzzlersWhiz – Modern EdTech Platform" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@puzzlerswhiz" />
    <meta name="twitter:creator" content="@puzzlerswhiz" />
    <meta name="twitter:title" content="PuzzlersWhiz – Learn. Practice. Master." />
    <meta name="twitter:description" content="PuzzlersWhiz is a modern EdTech platform helping students master cloud technologies, SQL, and real-world skills through HD courses, interactive labs, and timed quizzes." />
    <meta name="twitter:image" content="https://puzzlerswhiz.com/og-image.png" />

    <!-- Structured Data: WebSite + Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://puzzlerswhiz.com/#website",
          "name": "PuzzlersWhiz",
          "url": "https://puzzlerswhiz.com",
          "description": "Modern EdTech platform for cloud, SQL, and real-world skill learning",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://puzzlerswhiz.com/?s={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://puzzlerswhiz.com/#organization",
          "name": "PuzzlersWhiz",
          "url": "https://puzzlerswhiz.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://puzzlerswhiz.com/favicon.png"
          },
          "sameAs": [],
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "hello@puzzlerswhiz.com",
            "contactType": "customer support",
            "areaServed": "IN",
            "availableLanguage": "English"
          },
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Mumbai",
            "addressRegion": "Maharashtra",
            "addressCountry": "IN"
          }
        }
      ]
    }
    </script>

    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
